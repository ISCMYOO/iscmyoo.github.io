<!-- Image modal (centered dialog box) -->
<div id="img-modal" class="modal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-label="이미지 보기">
        <button id="img-modal-close" class="modal-close" aria-label="Close modal">&times;</button>
        <img class="modal-content" id="img-modal-img" src="" alt="">
        <div id="img-modal-caption" class="modal-caption" aria-hidden="true"></div>
    </div>
</div>

<script>
    // Robust lightbox for award images using event delegation + direct handlers
    (function () {
        const modal = document.getElementById('img-modal');
        const modalImg = document.getElementById('img-modal-img');
        const modalClose = document.getElementById('img-modal-close');
        const modalCaption = document.getElementById('img-modal-caption');

        function openModal(src, alt) {
            if (!src) return;
            modalImg.src = src;
            modalImg.alt = alt || '';
            modalCaption.innerText = alt || ''; // Set caption text
            // Force visibility and allow CSS to animate
            modal.style.display = 'flex';
            // tiny timeout to ensure the browser applies display before class change
            setTimeout(function(){
                modal.classList.add('open');
                modal.setAttribute('aria-hidden', 'false');
            }, 10);
            document.body.style.overflow = 'hidden';
            modalClose && modalClose.focus();
        }

        function closeModal() {
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            // allow transition then hide display
            setTimeout(function(){ modal.style.display = 'none'; }, 180);
            modalImg.src = '';
            document.body.style.overflow = '';
        }

        // Make close button keyboard-accessible
        if (modalClose) {
            modalClose.setAttribute('tabindex', '0');
            modalClose.setAttribute('role', 'button');
            modalClose.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeModal(); }
            });
            // direct click handler
            modalClose.addEventListener('click', function (e) { e.stopPropagation(); closeModal(); });
        }

        // clicking on overlay background should close modal (but not clicks inside modal-box)
        if (modal) {
            modal.addEventListener('click', function (e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        // Direct handlers on images (reliable fallback)
        const imgs = document.querySelectorAll('.award-img');
        imgs.forEach(img => {
            img.classList.add('is-clickable');
            img.setAttribute('tabindex', '0');
            img.setAttribute('role', 'button');
            img.addEventListener('click', function () { openModal(img.src, img.alt); });
            img.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(img.src, img.alt); }
            });
        });

        // Delegated click handler as additional safety
        document.addEventListener('click', function (evt) {
            const target = evt.target;
            if (target && target.classList && target.classList.contains('award-img')) {
                openModal(target.src, target.alt);
                return;
            }
            // clicking on icon container should also open
            const icon = target.closest && target.closest('.work-card-icon');
            if (icon) {
                const img = icon.querySelector && icon.querySelector('.award-img');
                if (img) { openModal(img.src, img.alt); return; }
            }
            // click on overlay or close button closes modal
            if (target === modal || target === modalClose) closeModal();
        }, false);

        // close on ESC
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
        });

        // prevent clicks on enlarged image from bubbling
        modalImg && modalImg.addEventListener('click', function (e) { e.stopPropagation(); });

        // Test button to open first award image (for troubleshooting/verification)
        const testBtn = document.getElementById('img-modal-test');
        if (testBtn) {
            testBtn.addEventListener('click', function () {
                const first = document.querySelector('.award-img');
                if (first) first.click();
            });
        }
    })();
</script>
