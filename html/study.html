<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부 자료 - ISCMYOO</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="header">
    <img src="../assets/image/profile.jpeg" alt="Yoo Sung Hwan Profile" class="profile-img">
    <h1>유성환 (Yoo Sung Hwan)</h1>
</header>

<section class="study container">
    <h2>📚 공부 자료</h2>

    <!-- Wargame study card -->
    <div class="info-card">
        <div class="edu-card-body">
            <div class="card-header">
                <img class="lab-logo" src="../assets/image/security.png" alt="Wargame logo">
                <div>
                    <h4>보안 실습 자료</h4>
                    <div class="major-kr muted">Wargame · CTF 기반의 실습 자료 모음</div>
                </div>
            </div>

            <!-- Tech-like tag area (DreamHack) using the study-scoped tech-box -->
            <div class="nav-card-tags">
                <a class="tech-box" href="https://www.notion.so/your-dreamhack-notes" target="_blank" rel="noopener noreferrer">
                    <img class="tech-icon" src="../assets/image/dreamhack.png" alt="DreamHack">
                    <span class="nav-card-tag">DreamHack</span>
                </a>
            </div>

        </div>
    </div>

    <!-- Coding Test study card -->
    <div class="info-card">
        <div class="edu-card-body">
            <div class="card-header">
                <img class="lab-logo" src="../assets/image/coding_test.png" alt="Coding logo">
                <div>
                    <h4>코딩 테스트</h4>
                    <div class="major-kr muted">자료구조·알고리즘 연습 자료</div>
                </div>
            </div>

            <div class="nav-card-tags">
                <a class="tech-box" href="https://www.acmicpc.net/" target="_blank" rel="noopener noreferrer">
                    <img class="tech-icon" src="../assets/image/beakjoon.png" alt="Beakjoon">
                    <span class="nav-card-tag">백준 알고리즘 (BOJ)</span>
                </a>

                <a class="tech-box" href="https://programmers.co.kr/" target="_blank" rel="noopener noreferrer">
                    <img class="tech-icon" src="../assets/image/programmers.png" alt="Programmers">
                    <span class="nav-card-tag">프로그래머스</span>
                </a>
            </div>

        </div>
    </div>

    <br>
    <a class="back-link" href="../index.html">← 돌아가기</a>
    <hr>
</section>
</body>
</html>
